# 注意规则在满足自己需求情况下，尽量做到精简，不要过度复杂，以免影响性能。
# 机场订阅
proxy-providers:
   Airport1:
    url: "httpuge"
    type: http
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: 直连

   Airport2:
    url: "htt69b19"
    type: http
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: 直连


# 节点信息
proxies:
  - {name: 直连, type: direct}
  - {name: 拒绝, type: reject}

# ==================== 全局配置 ====================
port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
tproxy-port: 7894
allow-lan: true
bind-address: "*"

# IPv6 彻底关闭策略
ipv6: false
prefer-ipv6: false

# 进阶性能与连接优化
log-level: warning
find-process-mode: 'off'
tcp-concurrent: true
tcp-fast-open: true

# 客户端指纹混淆
global-client-fingerprint: chrome

# 连接保活优化
keep-alive-idle: 300
keep-alive-interval: 15

# ==================== 控制面板 ====================
external-controller: 192.168.88.2:9090
secret: "2238"
external-ui: "/etc/nikki/run"
external-ui-name: zashboard
external-ui-url: "https://github.com/Zephyruso/zashboard/archive/refs/heads/gh-pages.zip"

# ==================== 嗅探与入站 ====================
sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  force-domain:
    - "+.v2ex.com"
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"

tun:
  enable: true
  stack: mixed
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true
  dns-hijack:
    - 0.0.0.0:53

dns:
  cache-algorithm: arc
  prefer-h3: false
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist
  fake-ip-ttl: 1
  respect-rules: true
  fake-ip-filter:
    - "rule-set:fakeipfilter_domain"
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  proxy-server-nameserver:
    - 114.114.114.114
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver-policy:
    "rule-set:CN_Site":
      - 223.5.5.5
      - 119.29.29.29
    "rule-set:geolocation-!cn":
      - 1.1.1.1
      - "https://dns.cloudflare.com/dns-query"
      - "https://dns.google/dns-query"
   
# ==================== 策略组 ====================
proxy-groups:
  - { name: ⚡️ 自动优选, type: url-test, include-all: true, filter: "(?i)香港|HK|日本|JP|新加坡|SG", url: "http://cp.cloudflare.com/generate_204", interval: 180, tolerance: 30 }
  - { name: Streaming, type: fallback, interval: 300, proxies: [香港-优选, 所有-手选] }
  - { name: Social-Media, type: select, proxies: [香港-优选, ⚡️ 自动优选] }
  - { name: Apple, type: select, proxies: [直连, ⚡️ 自动优选] }
  - { name: Game, type: select, proxies: [直连, 香港-优选, ⚡️ 自动优选, 所有-手选] }
  - { name: AI, type: select, proxies: [香港-优选,美国-优选] }
  - { name: 国外, type: select, proxies: [⚡️ 自动优选, 香港-优选, 所有-手选] }
  - { name: 国内, type: select, proxies: [直连, 拒绝] }
  - { name: 所有-手选, type: select, include-all: true, filter: "^((?!(直连|拒绝)).)*$" }
  - { name: 香港-优选, type: url-test, include-all: true, filter: "^(?=.*(HK|香港))(?!.*(日本|韩国|JP|KR|新加坡|英国)).*$", url: "http://cp.cloudflare.com/generate_204", interval: 180, tolerance: 30 }
  - { name: 香港-大流量, type: url-test, include-all: true, filter: "^(?=.*(香港))(?!.*(日本|韩国|JP|KR|新加坡|英国|HK)).*$", url: "http://cp.cloudflare.com/generate_204", interval: 180, tolerance: 30 }
  - { name: 台湾-手选, type: select, include-all: true, filter: "(?i)台湾|台灣|TW|Tai Wan|🇹🇼" }
  - { name: 日本-手选, type: select, include-all: true, filter: "(?i)日本|JP|🇯🇵" }
  - { name: 新加坡-手选, type: select, include-all: true, filter: "(?i)新加坡|SG|🇸🇬" }
  - { name: 韩国-手选, type: select, include-all: true, filter: "(?i)韩国|韓國|KR|🇰🇷" }
  - { name: 美国-优选, type: fallback, include-all: true, filter: "(?i)(美国|US|🇺🇸)", url: "http://cp.cloudflare.com/generate_204", interval: 180, tolerance: 50 }

# ==================== 规则集 ====================
rule-providers:
  fakeipfilter_domain: {type: http, behavior: domain, format: mrs, interval: 86400, url: "https://raw.githubusercontent.com/wwqgtxx/clash-rules/release/fakeip-filter.mrs", proxy: ⚡️ 自动优选}
  Gemini: {type: http, behavior: domain, format: mrs, interval: 86400, url: "https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geosite/google-gemini.mrs" , proxy: ⚡️ 自动优选}
  OpenAI: {type: http, behavior: domain, format: mrs, interval: 86400, url: "https://fastly.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geosite/openai.mrs" , proxy: ⚡️ 自动优选}
  Telegram: { type: http, behavior: domain, format: mrs, interval: 86400, url: "https://raw.githubusercontent.com/metacubex/meta-rules-dat/meta/geo/geosite/telegram.mrs", proxy: ⚡️ 自动优选 }
  Telegram_IP: {type: http, interval: 86400, behavior: ipcidr, format: mrs, url: "https://gh-proxy.com/github.com/metacubex/meta-rules-dat/raw/refs/heads/meta/geo/geoip/telegram.mrs", proxy: ⚡️ 自动优选}
  geolocation-!cn: { type: http, behavior: domain, format: mrs, interval: 86400, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/geolocation-!cn.mrs", proxy: ⚡️ 自动优选}
  Microsoft: { type: http, behavior: domain, format: mrs, interval: 86400, url: "https://gh-proxy.com/github.com/metacubex/meta-rules-dat/raw/refs/heads/meta/geo/geosite/microsoft.mrs", proxy: ⚡️ 自动优选 }
  netflix: { type: http, behavior: domain, format: mrs, interval: 86400, url: "https://gh-proxy.com/github.com/metacubex/meta-rules-dat/raw/refs/heads/meta/geo/geosite/netflix.mrs", proxy: ⚡️ 自动优选 }
  GitHub: { type: http, behavior: domain, format: mrs, interval: 86400, url: "https://raw.githubusercontent.com/metacubex/meta-rules-dat/meta/geo/geosite/github.mrs", proxy: ⚡️ 自动优选 }
  Apple: { type: http, behavior: domain, format: mrs, interval: 86400, url: "https://raw.githubusercontent.com/metacubex/meta-rules-dat/meta/geo/geosite/apple.mrs", proxy: ⚡️ 自动优选 }
  CN_Site: { type: http, behavior: domain, format: mrs, interval: 86400, url: "https://raw.githubusercontent.com/metacubex/meta-rules-dat/meta/geo/geosite/cn.mrs", proxy: ⚡️ 自动优选 }
  CN_IP: { type: http, behavior: ipcidr, format: mrs, interval: 86400, url: "https://raw.githubusercontent.com/metacubex/meta-rules-dat/meta/geo/geoip/cn.mrs", proxy: ⚡️ 自动优选 }
  category-games: { type: http, behavior: domain, format: mrs, interval: 86400, url: "https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geosite/category-games.mrs", proxy: ⚡️ 自动优选 }
  games-cn: { type: http, behavior: domain, format: mrs, interval: 86400, url: "https://github.com/DustinWin/ruleset_geodata/releases/download/mihomo-ruleset/games-cn.mrs", proxy: ⚡️ 自动优选 }
  YouTube: { type: http, behavior: domain, format: mrs, interval: 86400, url: "https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@meta/geo/geosite/youtube.mrs", proxy: ⚡️ 自动优选 }
  anti-ad: { type: http, behavior: domain, format: mrs, interval: 86400, url: "https://raw.githubusercontent.com/privacy-protection-tools/anti-ad.github.io/master/docs/mihomo.mrs", proxy: ⚡️ 自动优选 }
  AWAvenue: { type: http, behavior: domain, format: mrs, interval: 86400, url: "https://raw.githubusercontent.com/TG-Twilight/AWAvenue-Ads-Rule/main/Filters/AWAvenue-Ads-Rule-Clash.mrs", proxy: ⚡️ 自动优选 }
# ==================== 规则 (已优化匹配逻辑) ====================
rules:
  - RULE-SET,anti-ad,REJECT
  - RULE-SET,AWAvenue,REJECT
  # 1. 内网、特殊端口与本地保护 (最优先)
  - GEOIP,lan,DIRECT,no-resolve
  - GEOSITE,private,DIRECT

  # 3. 具体的国外服务分流 (防止被后面的大规则截获)
  - RULE-SET,Telegram_IP,Social-Media
  - RULE-SET,Telegram,Social-Media
  - RULE-SET,Gemini,香港-优选
  - RULE-SET,OpenAI,AI
  - RULE-SET,netflix,Streaming
  - RULE-SET,GitHub,香港-优选
  - RULE-SET,Apple,Apple
  - RULE-SET,YouTube,Streaming

# 4. 游戏规则
  - RULE-SET,games-cn,DIRECT
  - RULE-SET,category-games,Game
  - RULE-SET,Microsoft,DIRECT    # 微软建议直连，如需走代理可改为 国外/GitHub
  
  - DST-PORT,63219,DIRECT
  - SRC-PORT,63219,DIRECT
  - DST-PORT,6881-6889,DIRECT   # BT下载直连
  - DST-PORT,22,DIRECT          # SSH直连

  # === 香港汇丰银行 (HSBC HK) ===
  - DOMAIN-SUFFIX,hsbc.com.hk,DIRECT
  - DOMAIN-SUFFIX,hsbc.hk,DIRECT
  - DOMAIN-KEYWORD,hsbc,DIRECT

  # === 中银香港 (BOCHK) ===
  - DOMAIN-SUFFIX,bochk.com,DIRECT
  - DOMAIN-SUFFIX,boci.com.hk,DIRECT
  - DOMAIN-SUFFIX,bocgroup.com,DIRECT
  - DOMAIN-KEYWORD,bochk,DIRECT

  # 5. 漏网之鱼处理（全局大规则）
  - RULE-SET,CN_Site,DIRECT
  - RULE-SET,CN_IP,DIRECT,no-resolve
  - RULE-SET,geolocation-!cn,国外   # 兜底非中国流量走“国外”策略组而非直接固定香港
  
  # 6. 最终匹配
  - MATCH,香港-优选
