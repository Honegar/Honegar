# 节点信息
proxies:
    - {name: 直连, type: direct}
    - {name: 拒绝, type: reject}

# ==================== 全局配置 ====================
port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
tproxy-port: 7894
allow-lan: true
bind-address: "*"

# IPv6 彻底关闭策略
ipv6: false
prefer-ipv6: false

# 进阶性能与连接优化
log-level: warning
find-process-mode: 'off'
tcp-concurrent: true
tcp-fast-open: true

# 客户端指纹混淆
global-client-fingerprint: chrome

# 连接保活优化（释放死连接，减轻系统负担）
keep-alive-idle: 300
keep-alive-interval: 15

# ==================== 控制面板 ====================
external-controller: 192.168.88.1:9090
secret: "2238"
external-ui: "/etc/nikki/run"
external-ui-name: zashboard
external-ui-url: "https://github.com/Zephyruso/zashboard/archive/refs/heads/gh-pages.zip"

# ==================== 嗅探与入站 ====================
sniffer:
  enable: true
  override-destination: true
  sniff:
    HTTP: { ports: [80] }
    TLS: { ports: [443] }
    QUIC: { ports: [443] }
  skip-domain:
    - "+.mi.com"    # 使用 + 代替 *，Clash 规范中通常使用 + 匹配子域名
    - "+.apple.com"
    - "+.baidu.com"
    - "dlg.io.mi.com"

tun:
  enable: true
  # 1. 将协议栈从混杂模式改为 gvisor，大幅提升 UDP 游戏分流和网络稳定性
  stack: gvisor
  
  # 2. 保持双开启，作为 Linux 防火墙（nftables）自动接管三层流量的核心开关（不可关闭，否则断网）
  auto-route: true
  auto-redirect: true
  
  # 3. 彻底关闭自动检测出口！防止软路由内部网卡过多导致“流量回环死循环”断网
  auto-detect-interface: true
  
  # 4. 精简 DNS 劫持范围，any:53 默认已包含 UDP 和 TCP，无需重复写入
  dns-hijack:
    - "any:53"

#DNS模块
dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16 # 建议使用保留网段，更为稳妥
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "*.home.arpa"
    - "*.msftconnecttest.com"
    - "*.msftncsi.com"
    - "time.*.com"
    - "router.asus.com"
  default-nameserver:
    - 223.5.5.5
  proxy-server-nameserver:
    - 119.29.29.29
  # namesever尽量用运营商提供的DNS
  nameserver:
    - 114.114.114.114
    - 223.5.5.5
    - 119.29.29.29


# ==================== 策略组 ====================
proxy-groups:
  - { name: ⚡️ 自动优选, type: url-test, include-all: true, filter: "(?i)香港|HK|日本|JP|新加坡|SG", url: "http://cp.cloudflare.com/generate_204", interval: 180, tolerance: 50 }
  - { name: Streaming, type: fallback, interval: 300, proxies: [香港-优选,所有-手选] }
  - { name: Social-Media, type: select, proxies: [香港-优选] }
  - { name: GitHub, type: select, proxies: [⚡️ 自动优选, 直连] }
  - { name: Apple, type: select, proxies: [直连, ⚡️ 自动优选] }
  - { name: Game, type: select, proxies: [直连, ⚡️ 自动优选, 所有-手选] }
  - { name: Google, type: select, proxies: [美国-手选,香港-优选, 所有-手选] }
  - { name: 国外, type: select, proxies: [⚡️ 自动优选, 香港-优选, 所有-手选] }
  - { name: 国内, type: select, proxies: [直连, 拒绝] }
  - { name: 其他, type: select, proxies: [⚡️ 自动优选, 香港-优选, 所有-手选, 直连] }
  - { name: 所有-手选, type: select, include-all: true, filter: "^((?!(直连|拒绝)).)*$" }
  - { name: 香港-优选, type: url-test, include-all: true, filter: "(?i)香港|HK", url: "http://cp.cloudflare.com/generate_204", interval: 180, tolerance: 50 }
  - { name: 台湾-手选, type: select, include-all: true, filter: "(?i)台湾|台灣|TW|Tai Wan|🇹🇼" }
  - { name: 日本-手选, type: select, include-all: true, filter: "(?i)日本|JP|🇯🇵" }
  - { name: 新加坡-手选, type: select, include-all: true, filter: "(?i)新加坡|SG|🇸🇬" }
  - { name: 韩国-手选, type: select, include-all: true, filter: "(?i)韩国|韓國|KR|🇰🇷" }
  - { name: 美国-手选, type: select, include-all: true, filter: "(?i)美国|US|🇺🇸" }


