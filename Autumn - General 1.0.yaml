# ==================== 规则 ====================
rules:

  - RULE-SET,AWAvenue-Ads-Rule,REJECT
  - RULE-SET,category-games,Game
  - RULE-SET,games-cn,DIRECT

  # 1. 基础网络与直连保护
  - GEOIP,lan,DIRECT,no-resolve
  - GEOSITE,private,DIRECT
  - DST-PORT,123,DIRECT
  - SRC-PORT,63219,DIRECT
  
  # 2. 自定义业务
  - DOMAIN-KEYWORD,hsbc,DIRECT
  - DOMAIN-SUFFIX,tailscale.com,DIRECT
  - DOMAIN-KEYWORD,boc,DIRECT

  # 3. 分流规则

  - RULE-SET,Telegram / IP,Social-Media
  - RULE-SET,Youtube,Streaming
  - RULE-SET,netflix,Streaming
  - RULE-SET,Telegram,Social-Media
  - RULE-SET,GitHub,GitHub
  - RULE-SET,Apple,Apple
  - RULE-SET,Microsoft,Game
  - RULE-SET,Google,Google
  
  # 4. 国内流量
  - RULE-SET,CN_Site,国内
  - RULE-SET,CN_IP,国内,no-resolve
  
  # 5. 常见 BT/P2P 端口直连
  - DST-PORT,6881-6889,DIRECT
  - DST-PORT,22,DIRECT # SSH 直连
  
  # 6. 最终匹配
  - MATCH,其他
