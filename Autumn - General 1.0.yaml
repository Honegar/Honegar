# 注意规则在满足自己需求情况下，尽量做到精简，不要过度复杂，以免影响性能。
# 机场订阅
proxy-providers:
   Airport1:
    url: "httd506122e69b19"
    type: http
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: 直连

   Airport2:
    url: "htt503a15e64"
    type: http
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: 直连


# 节点信息
proxies:
    - {name: 直连, type: direct}
    - {name: 拒绝, type: reject}

# ==================== 全局配置 ====================
port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
tproxy-port: 7894
allow-lan: true
bind-address: "*"

# IPv6 彻底关闭策略
ipv6: false
prefer-ipv6: false

# 进阶性能与连接优化
log-level: warning
find-process-mode: 'off'
tcp-concurrent: true
tcp-fast-open: true

# 客户端指纹混淆
global-client-fingerprint: chrome

# 连接保活优化（释放死连接，减轻系统负担）
keep-alive-idle: 300
keep-alive-interval: 15

# ==================== 控制面板 ====================
external-controller: 192.168.88.2:9090
secret: "2238"
external-ui: "/etc/nikki/run"
external-ui-name: zashboard
external-ui-url: "https://github.com/Zephyruso/zashboard/archive/refs/heads/gh-pages.zip"

# ==================== 嗅探与入站 ====================
sniffer:
  enable: true
  override-destination: true
  sniff:
    HTTP:
      ports: [80]
    TLS:
      ports: [443]
    # 如果不需要对 HTTP3/QUIC 进行域名还原，建议直接删掉 QUIC 这一行，降低 UDP 状态追溯的开销
  skip-domain:
    - "+.mi.com"     # 已包含 dlg.io.mi.com，删除了下方的冗余项
    - "+.apple.com"
    - "+.baidu.com"

tun:
  enable: true
  
  # 1. 使用 gvisor 协议栈，提供极佳的 UDP 稳定性和安全隔离
  stack: gvisor
  
  # 2. 仅保留自动路由接管，精简 nftables 防火墙规则，避免重复重定向
  auto-route: true
  auto-redirect: true
  
  # 3. 真正关闭自动检测出口，显式指定物理 WAN 口，彻底杜绝虚拟网卡过多导致的回环死循环
  auto-detect-interface: true
  gateway: 192.168.88.1       # 填入你上级网关或主路由的 IP（若是主路由则可不填）
  # interface-name: eth0     # 强烈建议显式指定你的外网网卡名称（如 eth0, pppoe-wan）

  # 4. 精简 DNS 劫持范围
  dns-hijack:
    - "any:53"
    
  # 5. 性能进阶优化：开启 GSO 硬件卸载，提升吞吐并降低高并发下的 CPU 负载
  gso: true
  # mtu: 1500                # 常规环境保持 1500，若全链路支持巨型帧可设为 9000

# DNS模块 终极性能优化版
dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  respect-rules: true      
  use-system-hosts: true
  use-hosts: true                    
  cache-algorithm: arc               
  prefer-h3: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist
  
  # 极致精简的 fake-ip-filter：只放【必须拿到真实IP】的系统服务
  fake-ip-filter:
    - +.lan
    - +.local
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    - "time.*.com"

  # 1. 基础 Bootstrap：只给 DoH 域名引路
  default-nameserver:
    - 223.5.5.5

  # 2. 纯净兜底：没有命中 policy 规则的才走这里（纯国内/未知）
  nameserver:
    - https://dns.alidns.com/dns-query#h3=true
    - 119.29.29.29

  # 3. 节点解析升级：使用 H3 的阿里 DoH 替代纯 UDP，防止运营商对 53 端口的干扰
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query#h3=true
    - 223.5.5.5
    - 119.29.29.29

  # 5. 隐藏的高性能开关
  fast-resolve: true          # 激进的并发加速（谁快用谁）
  
# ==================== 策略组 ====================
proxy-groups:
  - { name: ⚡️ 自动优选, type: url-test, include-all: true, filter: "(?i)香港|HK|日本|JP|新加坡|SG", url: "http://cp.cloudflare.com/generate_204", interval: 180, tolerance: 50 }
  - { name: Streaming, type: fallback, interval: 300, proxies: [香港-优选,所有-手选] }
  - { name: Social-Media, type: select, proxies: [香港-优选] }
  - { name: GitHub, type: select, proxies: [⚡️ 自动优选, 直连] }
  - { name: Apple, type: select, proxies: [直连, ⚡️ 自动优选] }
  - { name: Game, type: select, proxies: [直连, ⚡️ 自动优选, 所有-手选] }
  - { name: Google, type: select, proxies: [美国-优选,香港-优选, 所有-手选] }
  - { name: 国外, type: select, proxies: [⚡️ 自动优选, 香港-优选, 所有-手选] }
  - { name: 国内, type: select, proxies: [直连, 拒绝] }
  - { name: 其他, type: select, proxies: [⚡️ 自动优选, 香港-优选, 所有-手选, 直连] }
  - { name: 所有-手选, type: select, include-all: true, filter: "^((?!(直连|拒绝)).)*$" }
  - { name: 香港-优选, type: url-test, include-all: true, filter: "(?i)香港|HK", url: "http://cp.cloudflare.com/generate_204", interval: 180, tolerance: 50 }
  - { name: 台湾-手选, type: select, include-all: true, filter: "(?i)台湾|台灣|TW|Tai Wan|🇹🇼" }
  - { name: 日本-手选, type: select, include-all: true, filter: "(?i)日本|JP|🇯🇵" }
  - { name: 新加坡-手选, type: select, include-all: true, filter: "(?i)新加坡|SG|🇸🇬" }
  - { name: 韩国-手选, type: select, include-all: true, filter: "(?i)韩国|韓國|KR|🇰🇷" }
  - { name: 美国-优选, type: fallback, include-all: true, filter: "(?i)(美国|US|🇺🇸)", url: "http://cp.cloudflare.com/generate_204", interval: 180, tolerance: 50 }


